version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: revio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-revio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revio_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-revio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-revio} -d ${POSTGRES_DB:-revio_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revio-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: revio-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revio-network

  # MinIO Bucket Setup (one-time init)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add minio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb minio/revio-papers --ignore-existing;
      /usr/bin/mc policy set public minio/revio-papers;
      exit 0;
      "
    networks:
      - revio-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: revio-backend
    restart: unless-stopped
    environment:
      # Server
      NODE_ENV: production
      PORT: 3001
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-revio}:${POSTGRES_PASSWORD:-revio_secure_password}@postgres:5432/${POSTGRES_DB:-revio_db}?schema=public
      
      # MinIO Storage
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: revio-papers
      
      # Authentication (generate strong secret!)
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_string_min_32_chars}
      JWT_EXPIRES_IN: 7d
      
      # AI Services
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-arcee-ai/trinity-large-preview:free}
      TINYFISH_API_KEY: ${TINYFISH_API_KEY:-}
      
      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    networks:
      - revio-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: revio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - revio-network
    profiles:
      - with-nginx

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  revio-network:
    driver: bridge
